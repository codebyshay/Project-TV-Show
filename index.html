<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shuheda(codebyshay)
  </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    #root {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      padding: 20px;
    }

    .episode {
      background: white;
      border-radius: 8px;
      padding: 10px;
      width: 250px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    img {
      width: 100%;
      border-radius: 4px;
    }

    h3 {
      font-size: 16px;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<h1>TV Show Episodes</h1>

<div id="root"></div>

<footer style="padding: 20px;">
  Data originally from 
  <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
</footer>

<script>
  const root = document.getElementById("root");

  // Example show: Game of Thrones (id = 82)
  const url = "https://api.tvmaze.com/shows/82/episodes";

  fetch(url)
    .then(response => response.json())
    .then(episodes => {
      episodes.forEach(ep => {
        const episodeCode = formatEpisodeCode(ep.season, ep.number);

        const div = document.createElement("div");
        div.className = "episode";

        div.innerHTML = `
          <h3>${episodeCode} - ${ep.name}</h3>
          <img src="${ep.image?.medium || ""}" alt="${ep.name}">
          <p>${ep.summary || "No summary available"}</p>
        `;

        root.appendChild(div);
      });
    });

  function formatEpisodeCode(season, number) {
    const s = String(season).padStart(2, "0");
    const e = String(number).padStart(2, "0");
    return `S${s}E${e}`;
  }
</script>

</body>
</html>
