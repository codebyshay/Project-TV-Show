<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TV Show Project | Shuheda Begum (codebyshay)</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>TV Show Explorer</h1>

    <a href="#" id="backToShows">← Back to all shows</a>

    <div id="showControls">
      <input id="showSearchInput" placeholder="Search shows..." />
      <p id="showResultsCount"></p>

      <select id="showSelect">
        <option value="">Select a show</option>
      </select>
    </div>

    <div id="episodeControls">
      <input id="searchInput" placeholder="Search episodes..." />

      <select id="episodeSelect">
        <option value="">All Episodes</option>
      </select>

      <p id="resultsCount"></p>
    </div>

    <a href="#" id="backToEpisodes">← Back to all episodes</a>

    <div id="showsRoot"></div>

    <div id="root"></div>

    <footer>
      Data originally from
      <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
