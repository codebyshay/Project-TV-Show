<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shuheda (codebyshay)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>TV Show Episodes</h1>
<a href="#" id="backToShows" style="display:none; text-align:center; display:block; margin:10px;">
  ← Back to all shows
</a>
    <!-- Controls -->
    <div id="controls">
      <!-- Show selector -->
  <input
  id="showSearchInput"
  placeholder="Search shows..."
/>
      <select id="showSelect">
        <option value="">Select a show</option>
      </select>
      <!-- Search box-->
      <input id="searchInput" placeholder="Search episodes..." />
      <p id="resultsCount"></p>
      <!-- Episode selector-->
      <select id="episodeSelect">
        <option value="">Select a show</option>
      </select>
    </div>

    <!-- Episodes -->
    <div id="showsRoot"></div>
    <div id="root"></div>

    <footer>
      Data originally from
      <a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
